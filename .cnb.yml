main:
  push:
    - name: lint-and-typecheck
      docker:
        image: node:20
      volumes:
        - node_modules:copy-on-write
      stages:
        - name: override npmrc
          script: echo 'registry=https://registry.npmjs.org/' > .npmrc
        - name: install dependencies
          script: |
            for i in 1 2 3; do
              if npm ci --ignore-scripts; then
                echo "Dependencies installed successfully"
                break
              elif [ $i -lt 3 ]; then
                echo "Attempt $i failed, retrying in 30 seconds..."
                sleep 30
              else
                echo "All 3 attempts failed"
                exit 1
              fi
            done
        - name: run linter
          script: npm run lint
        - name: typecheck root
          script: npx tsc --noEmit
        - name: typecheck electron
          script: npx tsc -p electron/tsconfig.json --noEmit
        - name: architecture check
          script: node scripts/check-architecture.mjs
        - name: module API consistency
          script: node scripts/check-module-api-consistency.mjs
        - name: contract validation
          script: node scripts/validate-contracts.mjs

    - name: unit-tests
      docker:
        image: node:20
      volumes:
        - node_modules:copy-on-write
      stages:
        - name: override npmrc
          script: echo 'registry=https://registry.npmjs.org/' > .npmrc
        - name: install dependencies
          script: |
            for i in 1 2 3; do
              if npm ci --ignore-scripts; then
                echo "Dependencies installed successfully"
                break
              elif [ $i -lt 3 ]; then
                echo "Attempt $i failed, retrying in 30 seconds..."
                sleep 30
              else
                echo "All 3 attempts failed"
                exit 1
              fi
            done
        - name: rebuild better-sqlite3
          script: npm rebuild better-sqlite3 || npm rebuild better-sqlite3
        - name: run unit tests
          script: npx vitest run

