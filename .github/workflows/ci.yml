name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npm_config_fetch_timeout: 600000
  npm_config_fetch_retry_mintimeout: 20000
  npm_config_fetch_retry_maxtimeout: 600000
  npm_config_fetch_retries: 10

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Override .npmrc for CI (use official sources)
        run: echo 'registry=https://registry.npmjs.org/' > .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            if npm ci --ignore-scripts; then
              echo "Dependencies installed successfully"
              break
            elif [ $i -lt 3 ]; then
              echo "Attempt $i failed, retrying in 30 seconds..."
              sleep 30
            else
              echo "All 3 attempts failed"
              exit 1
            fi
          done

      - name: Run linter
        run: npm run lint

      - name: TypeScript type check (root)
        run: npx tsc --noEmit

      - name: TypeScript type check (electron)
        run: npx tsc -p electron/tsconfig.json --noEmit

      - name: TypeScript type check (tests)
        run: npm run typecheck:test

      - name: Architecture check
        run: node scripts/check-architecture.mjs

      - name: Module API consistency check
        run: node scripts/check-module-api-consistency.mjs

      - name: Contract validation
        run: node scripts/validate-contracts.mjs

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Override .npmrc for CI (use official sources)
        run: echo 'registry=https://registry.npmjs.org/' > .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            if npm ci --ignore-scripts; then
              echo "Dependencies installed successfully"
              break
            elif [ $i -lt 3 ]; then
              echo "Attempt $i failed, retrying in 30 seconds..."
              sleep 30
            else
              echo "All 3 attempts failed"
              exit 1
            fi
          done

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Secret Scan
        run: |
          echo "Checking for hardcoded secrets..."
          grep -r -n -E "(api[_-]?key|apikey|secret[_-]?key|secretkey|password|token)\s*[=:]\s*['\"][^'\"]{10,}['\"]" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=dist \
            . || echo "No hardcoded secrets found"

          grep -r -n -E "-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=dist \
            . || echo "No private keys found"
        continue-on-error: true

  unit-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Override .npmrc for CI (use official sources)
        run: echo 'registry=https://registry.npmjs.org/' > .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            if npm ci --ignore-scripts; then
              echo "Dependencies installed successfully"
              break
            elif [ $i -lt 3 ]; then
              echo "Attempt $i failed, retrying in 30 seconds..."
              sleep 30
            else
              echo "All 3 attempts failed"
              exit 1
            fi
          done

      - name: Rebuild better-sqlite3 for current Node.js
        run: npm rebuild better-sqlite3 || npm rebuild better-sqlite3

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build-electron-win:
    runs-on: windows-latest
    needs: unit-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Override .npmrc for CI (use official sources)
        shell: pwsh
        run: Set-Content -Path .npmrc -Value 'registry=https://registry.npmjs.org/'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            npm ci --ignore-scripts
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Dependencies installed successfully"
              break
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Attempt $attempt failed, retrying in 30 seconds..."
              Start-Sleep -Seconds 30
            } else {
              Write-Host "All $maxAttempts attempts failed"
              exit 1
            }
          }

      - name: Build for Electron
        run: npm run build:electron

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          PYTHON: ${{ env.pythonLocation }}\python.exe

      - name: Import Windows signing certificate
        if: env.WINDOWS_CERT_BASE64 != ''
        run: |
          $certPath = Join-Path $env:TEMP "signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          echo "WINDOWS_CERT_FILE=$certPath" >> $env:GITHUB_ENV
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}

      - name: Package Electron app
        run: npx electron-builder --win --x64 --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_SIGN_ENABLED: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
          WINDOWS_CERT_FILE: ${{ env.WINDOWS_CERT_FILE }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          WINDOWS_PUBLISHER_NAME: ${{ secrets.WINDOWS_PUBLISHER_NAME }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-win
          path: release/

  build-electron-mac:
    runs-on: macos-latest
    needs: unit-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Override .npmrc for CI (use official sources)
        run: echo 'registry=https://registry.npmjs.org/' > .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            if npm ci --ignore-scripts; then
              echo "Dependencies installed successfully"
              break
            elif [ $i -lt 3 ]; then
              echo "Attempt $i failed, retrying in 30 seconds..."
              sleep 30
            else
              echo "All 3 attempts failed"
              exit 1
            fi
          done

      - name: Build for Electron
        run: npm run build:electron

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Import macOS signing certificate
        if: env.MAC_CERT_BASE64 != ''
        run: |
          security create-keychain -p actions temp.keychain
          security set-keychain-settings -lut 21600 temp.keychain
          security unlock-keychain -p actions temp.keychain

          certPath=$(mktemp)
          echo -n "$MAC_CERT_BASE64" | base64 --decode -o "$certPath"
          security import "$certPath" -k temp.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions temp.keychain

          security list-keychains -d user -s temp.keychain
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Package Electron app
        run: npx electron-builder --mac --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_SIGN_ENABLED: ${{ secrets.MAC_CERT_BASE64 != '' }}
          MAC_CERTIFICATE_NAME: ${{ secrets.MAC_CERTIFICATE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload Electron artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-mac
          path: release/

  dependency-review:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
        continue-on-error: true
        timeout-minutes: 10
