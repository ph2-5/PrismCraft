name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".ai/**"
      - ".trae/rules/**"
      - "LICENSE"
      - "COMMERCIAL_LICENSE.md"
      - "release/**"
      - "coverage/**"
      - "playwright-report/**"
      - "test-results/**"
      - ".stryker-tmp/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".ai/**"
      - ".trae/rules/**"
      - "LICENSE"
      - "COMMERCIAL_LICENSE.md"
      - "release/**"
      - "coverage/**"
      - "playwright-report/**"
      - "test-results/**"
      - ".stryker-tmp/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # main/master 分支上的构建（尤其是 45 分钟的 build-electron）不应被取消，
  # 否则可能导致发布产物不完整。其他分支/PR 可自由取消。
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  npm_config_fetch_timeout: 600000
  npm_config_fetch_retry_mintimeout: 20000
  npm_config_fetch_retry_maxtimeout: 600000
  npm_config_fetch_retries: 10

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run linter (src)
        run: npm run lint

      - name: Run linter (electron)
        run: npm run lint:electron

      - name: Build shared-logic (required for electron typecheck)
        run: npm run build:shared-logic

      - name: Setup shared-logic symlink (required for electron typecheck)
        run: node scripts/setup-shared-logic-symlink.mjs

      - name: TypeScript type check (root)
        run: npx tsc --noEmit

      - name: TypeScript type check (electron)
        run: npx tsc -p electron/tsconfig.json --noEmit

      - name: TypeScript type check (tests)
        run: npm run typecheck:test

      - name: Architecture check
        run: node scripts/check-architecture.mjs

      - name: Module API consistency check
        run: node scripts/check-module-api-consistency.mjs

      - name: Contract validation
        run: node scripts/validate-contracts.mjs

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run npm audit (critical vulnerabilities in production deps fail the build)
        # --omit=dev: 排除 dev 依赖（electron-rebuild/stryker/storybook 等构建工具的漏洞
        #              不影响最终用户，仅在开发环境运行）
        # --audit-level=critical: 仅 critical 级别失败；optional 依赖中的 high 漏洞
        #                         （如 @huggingface/transformers → adm-zip）不阻塞 CI
        # 生产 dependencies 当前 0 漏洞；定期通过 `npm audit --omit=dev` 检查 optional 漏洞
        run: npm audit --audit-level=critical --omit=dev

      - name: Secret Scan (hardcoded secrets fail the build)
        run: |
          echo "Checking for hardcoded secrets..."
          # Exclude test files (mock tokens) and require alphanumeric start (skip template literals ${...})
          if grep -r -n -E "(api[_-]?key|apikey|secret[_-]?key|secretkey|password|token)\s*[=:]\s*['\"][a-zA-Z0-9][^'\"]{9,}['\"]" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=dist \
            --exclude-dir=__tests__ --exclude="*.test.*" --exclude="*.spec.*" \
            .; then
            echo "::error::Hardcoded secrets detected — failing the build"
            exit 1
          else
            echo "✅ No hardcoded secrets found"
          fi

          if grep -r -n -E "-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=dist \
            .; then
            echo "::error::Private key detected — failing the build"
            exit 1
          else
            echo "✅ No private keys found"
          fi

  unit-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-scan]
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Rebuild better-sqlite3 for current Node.js
        # 单次重建：编译失败通常是环境问题（缺 Python/VS Build Tools），
        # 立即重试无意义，直接失败让开发者排查。
        run: npm rebuild better-sqlite3

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install Electron binary (required for electron tests)
        run: node node_modules/electron/install.js

      - name: Build shared-logic (required for electron tests)
        run: npm run build:shared-logic

      - name: Setup shared-logic symlink (required for electron tests)
        run: node scripts/setup-shared-logic-symlink.mjs

      - name: Run unit tests
        run: npx vitest run --coverage
        env:
          CI: true

      - name: Run electron main process tests
        run: npm run test:electron
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
        continue-on-error: true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-scan]
    # Web E2E 测试：覆盖关键用户路径（导航、故事板、分镜、Agent 等）
    # 不阻塞 build-electron-* jobs（它们只依赖 unit-tests）
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Build shared-logic (required for vite dev server)
        run: npm run build:shared-logic

      - name: Setup shared-logic symlink
        run: node scripts/setup-shared-logic-symlink.mjs

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (web)
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
        continue-on-error: true

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-test-results
          path: test-results/
        continue-on-error: true

  build-electron-win:
    runs-on: windows-latest
    needs: unit-tests
    timeout-minutes: 45
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Override .npmrc for CI (use official sources)
        shell: pwsh
        run: Set-Content -Path .npmrc -Value 'registry=https://registry.npmjs.org/'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            npm ci --ignore-scripts --legacy-peer-deps
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Dependencies installed successfully"
              break
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Attempt $attempt failed, retrying in 30 seconds..."
              Start-Sleep -Seconds 30
            } else {
              Write-Host "All $maxAttempts attempts failed"
              exit 1
            }
          }

      - name: Setup shared-logic symlink (required for electron type resolution)
        run: node scripts/setup-shared-logic-symlink.mjs

      - name: Build for Electron
        run: npm run build:electron

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          PYTHON: ${{ env.pythonLocation }}\python.exe

      - name: Import Windows signing certificate
        if: env.WINDOWS_CERT_BASE64 != ''
        run: |
          $certPath = Join-Path $env:TEMP "signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          echo "WINDOWS_CERT_FILE=$certPath" >> $env:GITHUB_ENV
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}

      - name: Package Electron app
        run: npx electron-builder --win --x64 --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_SIGN_ENABLED: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
          WINDOWS_CERT_FILE: ${{ env.WINDOWS_CERT_FILE }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          WINDOWS_PUBLISHER_NAME: ${{ secrets.WINDOWS_PUBLISHER_NAME }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: electron-build-win
          path: release/
          retention-days: 14

  build-electron-mac:
    runs-on: macos-latest
    needs: unit-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Setup shared-logic symlink (required for electron type resolution)
        run: node scripts/setup-shared-logic-symlink.mjs

      - name: Build for Electron
        run: npm run build:electron

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Import macOS signing certificate
        if: env.MAC_CERT_BASE64 != ''
        run: |
          security create-keychain -p actions temp.keychain
          security set-keychain-settings -lut 21600 temp.keychain
          security unlock-keychain -p actions temp.keychain

          certPath=$(mktemp)
          echo -n "$MAC_CERT_BASE64" | base64 --decode -o "$certPath"
          security import "$certPath" -k temp.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions temp.keychain

          security list-keychains -d user -s temp.keychain
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Package Electron app
        run: npx electron-builder --mac --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_SIGN_ENABLED: ${{ secrets.MAC_CERT_BASE64 != '' }}
          MAC_CERTIFICATE_NAME: ${{ secrets.MAC_CERTIFICATE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload Electron artifacts (macOS)
        uses: actions/upload-artifact@v7
        with:
          name: electron-build-mac
          path: release/
          retention-days: 14

  dependency-review:
    runs-on: ubuntu-latest
    needs: security-scan
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
        timeout-minutes: 10
