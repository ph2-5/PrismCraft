name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run linter
        run: npm run lint

      - name: TypeScript type check (root)
        run: npx tsc --noEmit

      - name: TypeScript type check (electron)
        run: npx tsc -p electron/tsconfig.json --noEmit

      - name: Architecture check
        run: node scripts/check-architecture.mjs

      - name: Module API consistency check
        run: node scripts/check-module-api-consistency.mjs

  # 安全扫描作业
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # npm audit - 检查依赖漏洞
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # 检查过时的依赖
      - name: Check for outdated dependencies
        run: npm outdated || true
        continue-on-error: true

      # CodeQL 静态分析
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # Secret 扫描 - 检测敏感信息泄露
      - name: Secret Scan
        run: |
          echo "检查硬编码密钥和敏感信息..."
          # 检查硬编码的 API 密钥模式
          grep -r -n -E "(api[_-]?key|apikey|secret[_-]?key|secretkey|password|token)\s*[=:]\s*['\"][^'\"]{10,}['\"]" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=dist \
            . || echo "未发现硬编码密钥"

          # 检查私钥格式
          grep -r -n -E "-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=dist \
            . || echo "未发现私钥"

          # 检查 AWS 凭证格式
          grep -r -n -E "(AKIA|ABIA|ACCA|ASIA)[0-9A-Z]{12,}" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=dist \
            . || echo "未发现 AWS 凭证"
        continue-on-error: true

      # SAST 扫描 - Semgrep
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/xss
            p/sql-injection
            p/insecure-transport
        continue-on-error: true

  unit-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            coverage/
            test-results/

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        run: npm run build

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/

  build-web:
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Next.js app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: .next/standalone/

  build-electron-win:
    runs-on: windows-latest
    needs: e2e-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          PYTHON: ${{ env.pythonLocation }}\python.exe

      - name: Build for Electron
        run: npm run build:electron

      # Windows 代码签名（可选，需要配置证书）
      - name: Import Windows signing certificate
        if: env.WINDOWS_CERT_BASE64 != ''
        run: |
          $certPath = Join-Path $env:TEMP "signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          echo "WINDOWS_CERT_FILE=$certPath" >> $env:GITHUB_ENV
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}

      - name: Package Electron app
        run: npx electron-builder --win --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_SIGN_ENABLED: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
          WINDOWS_CERT_FILE: ${{ env.WINDOWS_CERT_FILE }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          WINDOWS_PUBLISHER_NAME: ${{ secrets.WINDOWS_PUBLISHER_NAME }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-win
          path: release/

  # macOS 构建（可选，需要 macOS runner 和签名证书）
  build-electron-mac:
    runs-on: macos-latest
    needs: e2e-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build for Electron
        run: npm run build:electron

      # macOS 代码签名和公证（需要 Apple Developer 证书）
      - name: Import macOS signing certificate
        if: env.MAC_CERT_BASE64 != ''
        run: |
          # 创建临时 keychain
          security create-keychain -p actions temp.keychain
          security set-keychain-settings -lut 21600 temp.keychain
          security unlock-keychain -p actions temp.keychain

          # 导入证书
          certPath=$(mktemp)
          echo -n "$MAC_CERT_BASE64" | base64 --decode -o "$certPath"
          security import "$certPath" -k temp.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions temp.keychain

          # 设置默认 keychain
          security list-keychains -d user -s temp.keychain
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Package Electron app
        run: npx electron-builder --mac --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_SIGN_ENABLED: ${{ secrets.MAC_CERT_BASE64 != '' }}
          MAC_CERTIFICATE_NAME: ${{ secrets.MAC_CERTIFICATE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload Electron artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-mac
          path: release/

  # 依赖更新检查（可选，需要 GitHub Dependabot 或 Renovate）
  dependency-review:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
