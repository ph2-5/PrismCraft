name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  npm_config_fetch_timeout: 600000
  npm_config_fetch_retry_mintimeout: 20000
  npm_config_fetch_retry_maxtimeout: 600000
  npm_config_fetch_retries: 10

jobs:
  release-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Override .npmrc for CI (use official sources)
        run: echo 'registry=https://registry.npmjs.org/' > .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            if npm ci --ignore-scripts; then
              echo "Dependencies installed successfully"
              break
            elif [ $i -lt 3 ]; then
              echo "Attempt $i failed, retrying in 30 seconds..."
              sleep 30
            else
              echo "All 3 attempts failed"
              exit 1
            fi
          done

      - name: Build for Electron
        run: npm run build:electron

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Package Electron app and publish to GitHub Release
        run: npx electron-builder --mac --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-win:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Override .npmrc for CI (use official sources)
        run: echo 'registry=https://registry.npmjs.org/' > .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            npm ci --ignore-scripts
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Dependencies installed successfully"
              break
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Attempt $attempt failed, retrying in 30 seconds..."
              Start-Sleep -Seconds 30
            } else {
              Write-Host "All $maxAttempts attempts failed"
              exit 1
            }
          }

      - name: Build for Electron
        run: npm run build:electron

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          PYTHON: ${{ env.pythonLocation }}\python.exe

      - name: Package Electron app and publish to GitHub Release
        run: npx electron-builder --win --x64 --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
