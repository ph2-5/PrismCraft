name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  npm_config_fetch_timeout: 300000
  npm_config_fetch_retry_mintimeout: 20000
  npm_config_fetch_retry_maxtimeout: 300000
  npm_config_fetch_retries: 5

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            build_cmd: npx electron-builder --win --x64 --publish always
            artifact_pattern: release/*.exe
          - os: macos-latest
            platform: mac
            build_cmd: npx electron-builder --mac --publish always
            artifact_pattern: release/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Override .npmrc for CI (use official sources)
        shell: bash
        run: |
          cat > .npmrc << 'EOF'
          registry=https://registry.npmjs.org/
          electron_mirror=https://github.com/electron/electron/releases/download/
          electron_builder_binaries_mirror=https://github.com/electron-userland/electron-builder-binaries/releases/download/
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        shell: bash
        run: |
          for i in 1 2 3; do
            if npm ci --ignore-scripts; then
              echo "Dependencies installed successfully"
              break
            elif [ $i -lt 3 ]; then
              echo "Attempt $i failed, retrying in 10 seconds..."
              sleep 10
            else
              echo "All 3 attempts failed"
              exit 1
            fi
          done

      - name: Build for Electron
        run: npm run build:electron

      - name: Rebuild native modules for Electron (Windows)
        if: matrix.platform == 'win'
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          PYTHON: ${{ env.pythonLocation }}\python.exe

      - name: Rebuild native modules for Electron (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          PYTHON: ${{ env.pythonLocation }}/bin/python3

      - name: Package and publish Electron app
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-build-${{ matrix.platform }}
          path: ${{ matrix.artifact_pattern }}
