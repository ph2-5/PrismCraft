name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  npm_config_fetch_timeout: 600000
  npm_config_fetch_retry_mintimeout: 20000
  npm_config_fetch_retry_maxtimeout: 600000
  npm_config_fetch_retries: 10

jobs:
  release-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Override .npmrc for CI (use official sources)
        run: echo 'registry=https://registry.npmjs.org/' > .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            if npm ci --ignore-scripts --legacy-peer-deps; then
              echo "Dependencies installed successfully"
              break
            elif [ $i -lt 3 ]; then
              echo "Attempt $i failed, retrying in 30 seconds..."
              sleep 30
            else
              echo "All 3 attempts failed"
              exit 1
            fi
          done

      - name: Setup shared-logic symlink (required for electron type resolution)
        run: node scripts/setup-shared-logic-symlink.mjs

      - name: Build for Electron
        run: npm run build:electron

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Package Electron app (no auto-publish, upload via gh CLI)
        run: npx electron-builder --mac --publish=never

      - name: Upload macOS assets to GitHub Release
        run: |
          # 通过 gh CLI 上传到现有 release（支持 tag 触发和 workflow_dispatch）
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "Uploading macOS assets to release $TAG"
          gh release upload "$TAG" release/PrismCraft-*.dmg release/PrismCraft-*.dmg.blockmap release/PrismCraft-*.zip release/PrismCraft-*.zip.blockmap release/latest-mac.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-win:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Override .npmrc for CI (use official sources)
        run: echo 'registry=https://registry.npmjs.org/' > .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            npm ci --ignore-scripts --legacy-peer-deps
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Dependencies installed successfully"
              break
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Attempt $attempt failed, retrying in 30 seconds..."
              Start-Sleep -Seconds 30
            } else {
              Write-Host "All $maxAttempts attempts failed"
              exit 1
            }
          }

      - name: Setup shared-logic symlink (required for electron type resolution)
        run: node scripts/setup-shared-logic-symlink.mjs

      - name: Build for Electron
        run: npm run build:electron

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          PYTHON: ${{ env.pythonLocation }}\python.exe

      - name: Package Electron app (no auto-publish, upload via gh CLI)
        run: npx electron-builder --win --x64 --publish=never

      - name: Upload Windows assets to GitHub Release
        shell: pwsh
        run: |
          # 通过 gh CLI 上传到现有 release（支持 tag 触发和 workflow_dispatch）
          $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          if (-not $tag -or $tag -eq $env:GITHUB_REF) {
            $tag = "v$(node -p "require('./package.json').version")"
          }
          Write-Host "Uploading Windows assets to release $tag"
          gh release upload $tag release/PrismCraft-Setup.exe release/PrismCraft-Setup.exe.blockmap release/latest.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
