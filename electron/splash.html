<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Animation Studio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            text-align: center;
            color: white;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            margin: 0 0 10px 0;
            font-weight: 600;
        }
        p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
        }
        .loading {
            margin-top: 30px;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>AI Animation Studio</h1>
        <p>正在启动...</p>
        <div class="loading"></div>
    </div>
    <script>
        // 3秒后跳转到主应用
        setTimeout(() => {
            window.location.href = './index.html';
        }, 3000);
    </script>
</body>
</html>
