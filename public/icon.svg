<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <linearGradient id="prismLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ea8fe"/>
      <stop offset="50%" stop-color="#4f7cf0"/>
      <stop offset="100%" stop-color="#2d5bbf"/>
    </linearGradient>
    <linearGradient id="prismRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="50%" stop-color="#f06292"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="prismBottom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="33%" stop-color="#22d3ee"/>
      <stop offset="66%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="beam1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f87171" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="30%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="30%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="30%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0"/>
      <stop offset="30%" stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="topLight" cx="50%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景圆角方形 -->
  <rect x="0" y="0" width="512" height="512" rx="80" fill="url(#bgGrad)"/>

  <!-- 背景星光点缀 -->
  <circle cx="80" cy="100" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="430" cy="120" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="120" cy="420" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="390" cy="390" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="60" cy="260" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="450" cy="280" r="1.5" fill="#ffffff" opacity="0.3"/>

  <!-- 顶部入射光 -->
  <polygon points="246,20 266,20 256,120" fill="url(#topLight)"/>

  <!-- 折射光束（从棱镜底部射出的彩色光带） -->
  <rect x="220" y="330" width="72" height="160" fill="url(#beam1)" opacity="0.6" transform="rotate(-28 256 256)" filter="url(#glow)"/>
  <rect x="220" y="330" width="72" height="160" fill="url(#beam2)" opacity="0.6" transform="rotate(-14 256 256)" filter="url(#glow)"/>
  <rect x="220" y="330" width="72" height="160" fill="url(#beam3)" opacity="0.6" transform="rotate(0 256 256)" filter="url(#glow)"/>
  <rect x="220" y="330" width="72" height="160" fill="url(#beam4)" opacity="0.6" transform="rotate(14 256 256)" filter="url(#glow)"/>
  <rect x="220" y="330" width="72" height="160" fill="url(#beam5)" opacity="0.6" transform="rotate(28 256 256)" filter="url(#glow)"/>

  <!-- 棱镜主体 - 三角形 -->
  <polygon points="256,130 156,310 356,310" fill="url(#prismBottom)" opacity="0.25"/>
  <!-- 左斜面 -->
  <polygon points="256,130 156,310 256,310" fill="url(#prismLeft)" stroke="#a0c4ff" stroke-width="2"/>
  <!-- 右斜面 -->
  <polygon points="256,130 356,310 256,310" fill="url(#prismRight)" stroke="#ffb4a2" stroke-width="2"/>
  <!-- 顶部高光线 -->
  <line x1="256" y1="130" x2="256" y2="310" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.4"/>

  <!-- 棱镜内的小钻石/视频帧符号 -->
  <polygon points="256,210 230,245 256,280 282,245" fill="#ffffff" opacity="0.85"/>
  <polygon points="256,220 238,245 256,270 274,245" fill="none" stroke="#2d1b4e" stroke-width="2"/>

  <!-- 顶部高光点 -->
  <circle cx="256" cy="145" r="6" fill="#ffffff" opacity="0.9"/>
</svg>
